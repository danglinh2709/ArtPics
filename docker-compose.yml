version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: scrl_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: scrl_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend-api:
    build:
      context: ./beSCRL
      dockerfile: Dockerfile
    container_name: scrl_backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - CorsSettings__AllowedOrigins__0=*
    depends_on:
      - mongodb
      - minio
    restart: unless-stopped

volumes:
  mongo_data:
  minio_data:
