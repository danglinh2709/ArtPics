version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: scrl_mongodb_prod
    restart: always
    ports:
      - "127.0.0.1:27017:27017" # Localhost only for safety
    volumes:
      - mongo_data_prod:/data/db

  backend-api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/scrl-backend:latest
    container_name: scrl_backend_prod
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      # Pass secrets via VPS .env
    depends_on:
      - mongodb
    ports:
      - "127.0.0.1:8080:8080" # Nginx proxies to this

  nginx:
    image: nginx:alpine
    container_name: scrl_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend-api

volumes:
  mongo_data_prod:
